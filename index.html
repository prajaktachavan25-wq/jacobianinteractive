<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacobian Academy | Interactive Learner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.0/math.all.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Flashcard Styling */
        .flashcard-section {
            width: 100%;
            max-width: 800px;
            margin-bottom: 40px;
        }

        .card-container {
            perspective: 1000px;
            height: 200px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border-radius: 15px;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: 15px;
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            box-sizing: border-box;
        }

        .card-back {
            transform: rotateY(180deg);
            background: var(--primary);
        }

        /* Problem Section */
        .workspace {
            width: 100%;
            max-width: 800px;
            background: var(--surface);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .problem-text {
            font-size: 1.4rem;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 5px solid var(--secondary);
        }

        .step-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .step-input-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
        }

        label { color: #94a3b8; font-size: 0.9rem; }

        input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #475569;
            color: white;
            font-size: 1.1rem;
            padding: 8px 0;
            outline: none;
            margin-top: 5px;
        }

        input.valid { border-color: var(--success); color: var(--success); }
        input.invalid { border-color: var(--error); }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-check { background: var(--primary); color: white; }
        .btn-next { background: #475569; color: white; }
        
        .feedback-toast {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="flashcard-section">
        <h2 style="text-align: center; color: var(--secondary);">Theory Flashcard</h2>
        <div class="card-container" id="theoryCard" onclick="this.classList.toggle('flipped')">
            <div class="card-inner">
                <div class="card-front">
                    <h3 id="cardTitle">What is a Jacobian?</h3>
                    <p style="color: #94a3b8;">(Click to flip)</p>
                </div>
                <div class="card-back">
                    <p id="cardDescription">The Jacobian matrix is a matrix of all first-order partial derivatives of a vector-valued function.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="workspace">
        <h2 style="margin-top:0;">Step-by-Step Solver</h2>
        <div class="problem-text" id="problemDisplay">
            Loading problem...
        </div>

        <div class="step-grid">
            <div class="step-input-box">
                <label id="l0">∂u / ∂x</label>
                <input type="text" id="ans0" placeholder="Type answer...">
            </div>
            <div class="step-input-box">
                <label id="l1">∂u / ∂y</label>
                <input type="text" id="ans1" placeholder="Type answer...">
            </div>
            <div class="step-input-box">
                <label id="l2">∂v / ∂x</label>
                <input type="text" id="ans2" placeholder="Type answer...">
            </div>
            <div class="step-input-box">
                <label id="l3">∂v / ∂y</label>
                <input type="text" id="ans3" placeholder="Type answer...">
            </div>
        </div>

        <div id="toast" class="feedback-toast"></div>

        <div class="controls">
            <button class="btn-check" onclick="verifySteps()">Verify My Answers</button>
            <button class="btn-next" onclick="loadNextProblem()">Next Problem</button>
        </div>
    </div>

<script>
    const theoryItems = [
        { q: "What is a Jacobian?", a: "It's a matrix of partial derivatives that describes how a multi-variable function changes at a point." },
        { q: "The 2x2 Formula", a: "J = [[∂u/∂x, ∂u/∂y], [∂v/∂x, ∂v/∂y]]" },
        { q: "What if J = 0?", a: "If the Jacobian is zero everywhere, the functions are 'Functionally Dependent' (related by a formula)." }
    ];

    const problems = [
        { 
            desc: "If u = x(1-y), v = xy, find the Jacobian.",
            u: "x - x*y", v: "x*y",
            sols: ["1-y", "-x", "y", "x"]
        },
        { 
            desc: "If u = x + y^2/x, v = y^2/x, find the Jacobian.",
            u: "x + y^2/x", v: "y^2/x",
            sols: ["1 - y^2/x^2", "2*y/x", "-y^2/x^2", "2*y/x"]
        },
        {
            desc: "Trig Challenge: x = e^v * sec(u), y = e^v * tan(u)",
            u: "sec(u)*exp(v)", v: "tan(u)*exp(v)",
            sols: ["sec(u)*tan(u)*exp(v)", "sec(u)*exp(v)", "sec(u)^2 * exp(v)", "tan(u)*exp(v)"]
        }
    ];

    let currentProbIdx = 0;
    let currentTheoryIdx = 0;

    function loadNextProblem() {
        currentProbIdx = (currentProbIdx + 1) % problems.length;
        currentTheoryIdx = (currentTheoryIdx + 1) % theoryItems.length;
        
        // Update Flashcard
        document.getElementById('cardTitle').innerText = theoryItems[currentTheoryIdx].q;
        document.getElementById('cardDescription').innerText = theoryItems[currentTheoryIdx].a;
        document.getElementById('theoryCard').classList.remove('flipped');

        // Update Problem
        const p = problems[currentProbIdx];
        document.getElementById('problemDisplay').innerText = p.desc;
        
        // Clear Inputs
        for(let i=0; i<4; i++) {
            const input = document.getElementById('ans' + i);
            input.value = "";
            input.className = "";
        }
        document.getElementById('toast').innerText = "";
    }

    function verifySteps() {
        const p = problems[currentProbIdx];
        let allCorrect = true;

        for(let i=0; i<4; i++) {
            const userAns = document.getElementById('ans' + i).value;
            const inputEl = document.getElementById('ans' + i);
            
            try {
                // Using Math.js to check if expressions are equal
                const isCorrect = math.simplify(userAns).equals(math.simplify(p.sols[i]));
                if(isCorrect) {
                    inputEl.className = "valid";
                } else {
                    inputEl.className = "invalid";
                    allCorrect = false;
                }
            } catch(e) {
                inputEl.className = "invalid";
                allCorrect = false;
            }
        }

        const toast = document.getElementById('toast');
        if(allCorrect) {
            toast.innerText = "Excellent! You mastered this Jacobian.";
            toast.style.color = "var(--success)";
        } else {
            toast.innerText = "Some steps are incorrect. Hint: Re-check your partial derivatives!";
            toast.style.color = "var(--error)";
        }
    }

    // Initial load
    document.getElementById('problemDisplay').innerText = problems[0].desc;
</script>
</body>
</html>
